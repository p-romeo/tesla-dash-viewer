name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (mutable tags are a supply-chain risk); the job
      # never pushes, so the checkout token isn't persisted.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      # Electron's binary isn't needed for any gate; skip the ~100MB download.
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
