name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The underlying need, not just the proposed feature — there may be a better way to solve it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Note — some asks are limits of Tesla's data, not the app (e.g. RecentClips have no GPS, so no map is possible for them).
